spring:
  application:
    name: inscribe-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    session:
      timeout: 30m
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    connection-timeout: 10s

spring.lifecycle:
  timeout-per-shutdown-phase: 30s

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: XsLuqjuwm4KRLNuGZjDteia6lvWUaWjIq9OZA0iGExk=
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

aws:
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${AWS_S3_BUCKET}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
